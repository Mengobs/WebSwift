<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSwift - Demo Page</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="overlay"></div>
    <swift-window title="WebSwift" width="60%" height="80%">
        <div class="row first">
            <p>Button</p>
            <div>
                <swift-button>Button</swift-button>
                <swift-button primary>Button</swift-button>
            </div>
        </div>
        <div class="row middle">
            <p>Input</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <swift-input placeholder="WebSwift"></swift-input>
                <swift-input placeholder="WebSwift" type="search"></swift-input>
            </div>
        </div>
        <div class="row middle">
            <p>Switch</p>
            <swift-switch></swift-switch>
        </div>
        <div class="row middle">
            <p>Menu</p>
            <swift-menu>
                <p>Menu 1</p>
                <p>Menu 2</p>
                <p>Menu 3</p>
                <p>Menu 4</p>
                <p>Menu 5</p>
            </swift-menu>
        </div>
        <div class="row middle">
            <p>Checkbox</p>
            <swift-checkbox state="on">Checkbox</swift-checkbox>
        </div>
        <div class="row middle">
            <p>Messagebox</p>
            <swift-button primary onclick="summon_messagebox()">Show</swift-button>
        </div>
        <div class="row middle">
            <p>Notification</p>
            <swift-button primary onclick="summon_notification()">Show</swift-button>
        </div>
        <div class="row last" style="margin-bottom: 40px">
            <p>Progress</p>
            <div style="display: flex; flex-direction: column; gap: 25px;">
                <swift-progress progress="25"></swift-progress>
                <swift-progress small progress="75"></swift-progress>
            </div>
        </div>
    </swift-window>

    <!-- <script src="https://cdn.jsdelivr.net/gh/mengobs/webintosh-desktop/src/javascripts/ui/webswift.js"></script> -->
    <script src="../webswift.js"></script>
    <script>
        function summon_messagebox() {
            document.body.insertAdjacentHTML("beforeend", `<swift-messagebox iconpath="../Logo.png">
    <p slot="title">Messagebox</p>
    <p slot="text">This message box is part of WebSwift, designed by Apple in California</p>
    <swift-button primary slot="button" onclick="this.parentNode.remove()">OK</swift-button>
</swift-messagebox>`);
        }

        function summon_notification() {
            document.body.insertAdjacentHTML("beforeend", `<swift-notification iconpath="../Logo.png" onclick="this.remove()">
    <p slot="title">Notification</p>
    <p slot="text">This notification is part of WebSwift, designed by Apple in California</p>
    <p slot="time">now</p>
</swift-notification>`);
        }
    </script>
</body>

</html>
